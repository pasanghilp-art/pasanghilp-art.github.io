<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager — Pasang Tamang</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="app">

    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <h1 class="app-title">My <span>Tasks</span> ✅</h1>
        <p class="app-sub">Stay on top of everything — one task at a time</p>
      </div>
      <a href="https://pasanghilp-art.github.io" class="back-link">← Portfolio</a>
    </header>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <span class="stat-num" id="stat-total">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat high">
        <span class="stat-num" id="stat-high">0</span>
        <span class="stat-label">High</span>
      </div>
      <div class="stat med">
        <span class="stat-num" id="stat-med">0</span>
        <span class="stat-label">Medium</span>
      </div>
      <div class="stat done">
        <span class="stat-num" id="stat-done">0</span>
        <span class="stat-label">Done</span>
      </div>
    </div>

    <!-- Input -->
    <div class="input-card">
      <div class="input-row">
        <input
          class="task-input"
          id="taskInput"
          type="text"
          placeholder="Add a new task..."
          maxlength="80"
          autocomplete="off"
        />
        <button class="add-btn" id="addBtn">+ Add</button>
      </div>
      <div class="priority-row">
        <span class="priority-label">Priority:</span>
        <button class="pri-btn high selected" data-priority="high">🔴 High</button>
        <button class="pri-btn med"           data-priority="med">🟡 Medium</button>
        <button class="pri-btn low"           data-priority="low">🟢 Low</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-row">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="high">🔴 High</button>
      <button class="filter-btn" data-filter="med">🟡 Medium</button>
      <button class="filter-btn" data-filter="low">🟢 Low</button>
      <button class="filter-btn" data-filter="done">✅ Done</button>
    </div>

    <!-- Task list -->
    <div class="task-list" id="taskList"></div>

    <!-- Bottom row -->
    <div class="bottom-row">
      <span class="task-count" id="taskCount"></span>
      <button class="clear-btn" id="clearBtn">🗑 Clear completed</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
